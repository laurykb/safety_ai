name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  PYTHONPATH: .:src:configs

jobs:
  structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Vérifier structure projet
        run: |
          for f in run.py streamlit_app.py src/cyberbullying/loading.py \
                   app/main.py scripts/run_pipeline.py scripts/_bootstrap.py configs/train.yaml; do
            test -f "$f" || { echo "Fichier manquant: $f"; exit 1; }
          done
          echo "Structure OK"

  test:
    runs-on: ubuntu-latest
    needs: structure
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python run.py test

      - name: Smoke test imports
        run: |
          python -c "
          from cyberbullying.loading import binary_load_data
          from cyberbullying.embedder import embed_texts
          from app.main import run
          print('Imports OK')
          "
  lint:
    runs-on: ubuntu-latest
    needs: structure
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pre-commit
        run: pip install pre-commit
      - name: Run pre-commit
        run: pre-commit run --all-files

  docker:
    runs-on: ubuntu-latest
    needs: [structure, test]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t safety-ai:ci .
      - name: Smoke test container
        run: |
          docker run --rm -e AUTH_DISABLED=1 -e PYTHONPATH=/app:/app/src:/app/configs safety-ai:ci \
            python -c "from app.main import run; print('OK')"

